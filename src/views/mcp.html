<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP 管理面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      /* ===== 全局重置 ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        min-height: 100vh;
        background: #0b0e17;
        background-image:
          radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
        display: flex;
        justify-content: center;
        padding: 32px 24px;
        color: #f1f5f9;
      }

      .app {
        max-width: 1360px;
        width: 100%;
      }

      /* ===== 滚动条 ===== */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.04);
        border-radius: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 8px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      /* ===== 头部 ===== */
      .header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 40px;
        gap: 16px;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .logo-icon {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: #fff;
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.35);
        position: relative;
      }
      .logo-icon::after {
        content: '';
        position: absolute;
        inset: -2px;
        border-radius: 18px;
        background: linear-gradient(135deg, #6366f1, #a855f7, #6366f1);
        background-size: 200% 200%;
        z-index: -1;
        filter: blur(12px);
        opacity: 0.5;
        animation: glowPulse 3s ease-in-out infinite;
      }
      @keyframes glowPulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.8;
        }
      }

      .header h1 {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, #f1f5f9, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .header h1 small {
        font-weight: 500;
        font-size: 15px;
        -webkit-text-fill-color: #64748b;
        background: none;
        margin-left: 10px;
        letter-spacing: 0;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 22px;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        transition: all 0.25s ease;
        background: rgba(255, 255, 255, 0.06);
        color: #e2e8f0;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.12);
        transform: translateY(-2px);
      }

      .btn-primary {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        border: none;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
      }
      .btn-primary:hover {
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.5);
        transform: translateY(-2px);
        background: linear-gradient(135deg, #818cf8, #a78bfa);
      }

      .btn-ghost {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 10px 16px;
      }
      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .btn-sm {
        padding: 6px 14px;
        font-size: 13px;
        border-radius: 8px;
      }
      .btn-icon {
        padding: 8px 10px;
        border-radius: 10px;
      }
      .btn-danger-ghost {
        background: transparent;
        color: #f87171;
        border: 1px solid transparent;
      }
      .btn-danger-ghost:hover {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
      }

      /* ===== 统计卡片 ===== */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        padding: 20px 24px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      .stat-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        border-radius: 18px 18px 0 0;
        opacity: 0.6;
      }
      .stat-card:nth-child(1)::before {
        background: linear-gradient(90deg, #6366f1, #a855f7);
      }
      .stat-card:nth-child(2)::before {
        background: linear-gradient(90deg, #22c55e, #34d399);
      }
      .stat-card:nth-child(3)::before {
        background: linear-gradient(90deg, #f59e0b, #fbbf24);
      }
      .stat-card:nth-child(4)::before {
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
      }

      .stat-card:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
      }

      .stat-label {
        font-size: 13px;
        font-weight: 500;
        color: #94a3b8;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .stat-label i {
        font-size: 14px;
        opacity: 0.7;
      }

      .stat-value {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #f1f5f9;
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .stat-value .stat-change {
        font-size: 13px;
        font-weight: 500;
        color: #34d399;
        background: rgba(34, 197, 94, 0.15);
        padding: 2px 12px;
        border-radius: 20px;
        display: inline-block;
      }

      /* ===== 工具栏 ===== */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 28px;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        padding: 14px 20px;
      }

      .toolbar-left {
        display: flex;
        align-items: center;
        gap: 14px;
        flex: 1 1 300px;
      }

      .search-box {
        position: relative;
        flex: 1;
        min-width: 180px;
      }
      .search-box i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #64748b;
        font-size: 15px;
      }
      .search-box input {
        width: 100%;
        padding: 10px 16px 10px 42px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
        background: rgba(255, 255, 255, 0.04);
        color: #f1f5f9;
        transition: all 0.3s ease;
        outline: none;
      }
      .search-box input::placeholder {
        color: #64748b;
      }
      .search-box input:focus {
        border-color: rgba(99, 102, 241, 0.4);
        background: rgba(255, 255, 255, 0.07);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
      }

      .filter-group {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .filter-chip {
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.04);
        color: #94a3b8;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
      }
      .filter-chip:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #e2e8f0;
      }
      .filter-chip.active {
        background: rgba(99, 102, 241, 0.2);
        color: #a5b4fc;
        border-color: rgba(99, 102, 241, 0.25);
      }

      .toolbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #64748b;
        font-size: 13px;
      }
      .toolbar-right i {
        margin-right: 4px;
      }

      /* ===== 卡片网格 ===== */
      .grid-wrapper {
        position: relative;
      }

      .mcp-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }

      .mcp-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 24px 24px 20px;
        transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .mcp-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.03), rgba(139, 92, 246, 0.01));
        pointer-events: none;
      }
      .mcp-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.12);
        transform: translateY(-4px);
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
      }

      .mcp-card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 14px;
        position: relative;
        z-index: 1;
      }

      .mcp-card-left {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .mcp-avatar {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        color: #fff;
        flex-shrink: 0;
        position: relative;
      }
      .mcp-avatar.blue {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      }
      .mcp-avatar.purple {
        background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      }
      .mcp-avatar.green {
        background: linear-gradient(135deg, #22c55e, #15803d);
      }
      .mcp-avatar.orange {
        background: linear-gradient(135deg, #f59e0b, #b45309);
      }
      .mcp-avatar.pink {
        background: linear-gradient(135deg, #ec4899, #be185d);
      }
      .mcp-avatar.teal {
        background: linear-gradient(135deg, #14b8a6, #0f766e);
      }
      .mcp-avatar.red {
        background: linear-gradient(135deg, #ef4444, #b91c1c);
      }
      .mcp-avatar.indigo {
        background: linear-gradient(135deg, #6366f1, #4338ca);
      }

      .mcp-card-info {
        min-width: 0;
      }
      .mcp-card-info .name {
        font-weight: 700;
        font-size: 17px;
        color: #f1f5f9;
        letter-spacing: -0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .mcp-card-info .desc {
        font-size: 13px;
        color: #94a3b8;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mcp-card-status {
        flex-shrink: 0;
        margin-left: 8px;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 14px 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      .status-badge .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
      }
      .status-badge.active {
        background: rgba(34, 197, 94, 0.15);
        color: #34d399;
      }
      .status-badge.active .dot {
        background: #22c55e;
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
      }
      .status-badge.inactive {
        background: rgba(239, 68, 68, 0.12);
        color: #f87171;
      }
      .status-badge.inactive .dot {
        background: #ef4444;
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.2);
      }
      .status-badge.pending {
        background: rgba(245, 158, 11, 0.14);
        color: #fbbf24;
      }
      .status-badge.pending .dot {
        background: #f59e0b;
        box-shadow: 0 0 8px rgba(245, 158, 11, 0.2);
      }

      .mcp-card-body {
        flex: 1;
        position: relative;
        z-index: 1;
        margin-bottom: 16px;
      }

      .mcp-endpoint {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #94a3b8;
        background: rgba(255, 255, 255, 0.04);
        padding: 6px 14px;
        border-radius: 10px;
        font-family: 'Inter', monospace;
        border: 1px solid rgba(255, 255, 255, 0.04);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        width: 100%;
      }
      .mcp-endpoint i {
        color: #64748b;
        font-size: 13px;
        flex-shrink: 0;
      }
      .mcp-endpoint span {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mcp-card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
        z-index: 1;
      }

      .mcp-card-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .mcp-card-actions .btn {
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 13px;
      }

      .toggle-switch {
        position: relative;
        width: 42px;
        height: 24px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 40px;
        cursor: pointer;
        transition: background 0.3s ease;
        flex-shrink: 0;
        border: none;
        padding: 0;
      }
      .toggle-switch.active {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
      }
      .toggle-switch::after {
        content: '';
        position: absolute;
        width: 18px;
        height: 18px;
        background: #fff;
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .toggle-switch.active::after {
        transform: translateX(18px);
      }

      .mcp-card-footer-left {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #64748b;
      }
      .mcp-card-footer-left i {
        font-size: 13px;
      }

      /* ===== 空状态 ===== */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
        color: #64748b;
        text-align: center;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 24px;
        border: 1px dashed rgba(255, 255, 255, 0.06);
      }
      .empty-state i {
        font-size: 56px;
        color: rgba(255, 255, 255, 0.06);
        margin-bottom: 20px;
      }
      .empty-state p {
        font-size: 16px;
        max-width: 320px;
      }

      /* ===== 分页 ===== */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
        padding: 16px 0 4px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
      }

      .pagination-info {
        font-size: 14px;
        color: #64748b;
      }
      .pagination-info strong {
        color: #e2e8f0;
        font-weight: 600;
      }

      .pagination-btns {
        display: flex;
        gap: 4px;
      }

      .page-btn {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        border: 1px solid transparent;
        background: transparent;
        font-weight: 500;
        font-size: 14px;
        color: #94a3b8;
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
      }
      .page-btn:hover {
        background: rgba(255, 255, 255, 0.06);
        color: #e2e8f0;
      }
      .page-btn.active {
        background: rgba(99, 102, 241, 0.2);
        color: #a5b4fc;
        border-color: rgba(99, 102, 241, 0.2);
      }
      .page-btn.arrow {
        color: #64748b;
      }
      .page-btn.arrow:hover {
        color: #e2e8f0;
        background: rgba(255, 255, 255, 0.04);
      }
      .page-btn:disabled {
        opacity: 0.3;
        cursor: default;
        pointer-events: none;
      }

      /* ===== Toast ===== */
      .toast-container {
        position: fixed;
        bottom: 32px;
        right: 32px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 999;
      }

      .toast {
        background: rgba(15, 23, 42, 0.92);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #f1f5f9;
        padding: 14px 24px;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 500;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        gap: 12px;
        animation: slideUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: bottom right;
      }
      .toast i {
        font-size: 18px;
      }
      .toast.success i {
        color: #34d399;
      }
      .toast.info i {
        color: #60a5fa;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.94);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .toast.removing {
        animation: slideDown 0.3s ease forwards;
      }
      @keyframes slideDown {
        to {
          opacity: 0;
          transform: translateY(16px) scale(0.94);
        }
      }

      /* ===== 响应式 ===== */
      @media (max-width: 1024px) {
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .mcp-grid {
          grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
      }

      @media (max-width: 768px) {
        body {
          padding: 20px 16px;
        }
        .header {
          flex-direction: column;
          align-items: stretch;
          gap: 14px;
        }
        .header-actions {
          flex-wrap: wrap;
        }
        .stats-grid {
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }
        .stat-card {
          padding: 16px 18px;
        }
        .stat-value {
          font-size: 26px;
        }
        .toolbar {
          flex-direction: column;
          align-items: stretch;
          padding: 14px 16px;
        }
        .toolbar-left {
          flex-wrap: wrap;
        }
        .search-box {
          min-width: 100%;
        }
        .filter-group {
          flex-wrap: wrap;
        }
        .mcp-grid {
          grid-template-columns: 1fr;
          gap: 16px;
        }
        .mcp-card {
          padding: 20px;
        }
        .pagination {
          flex-direction: column;
          align-items: center;
          text-align: center;
        }
        .mcp-card-footer {
          flex-wrap: wrap;
          gap: 10px;
        }
        .header h1 small {
          display: block;
          margin-left: 0;
          margin-top: 2px;
        }
      }

      @media (max-width: 480px) {
        .stats-grid {
          grid-template-columns: 1fr 1fr;
          gap: 8px;
        }
        .stat-card {
          padding: 14px 16px;
        }
        .stat-value {
          font-size: 22px;
        }
        .stat-label {
          font-size: 11px;
        }
        .header h1 {
          font-size: 22px;
        }
        .logo-icon {
          width: 44px;
          height: 44px;
          font-size: 20px;
        }
        .mcp-card-info .name {
          font-size: 15px;
        }
        .mcp-card-info .desc {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- ===== 头部 ===== -->
      <header class="header">
        <div class="header-left">
          <div class="logo-icon">
            <i class="fas fa-bolt"></i>
          </div>
          <h1>
            MCP 专区
            <small>Model Context Protocol</small>
          </h1>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost btn-sm" onclick="refreshList()">
            <i class="fas fa-sync-alt"></i> 刷新
          </button>
          <button class="btn btn-primary" onclick="addMCP()">
            <i class="fas fa-plus"></i> 添加 MCP
          </button>
        </div>
      </header>

      <!-- ===== 统计卡片 ===== -->
      <section class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-label"><i class="fas fa-cubes"></i> 总计</div>
          <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><i class="fas fa-check-circle"></i> 已启用</div>
          <div class="stat-value" id="activeCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><i class="fas fa-pause-circle"></i> 已禁用</div>
          <div class="stat-value" id="inactiveCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><i class="fas fa-clock"></i> 待审核</div>
          <div class="stat-value" id="pendingCount">0</div>
        </div>
      </section>

      <!-- ===== 工具栏 ===== -->
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="搜索 MCP 名称或描述..."
              oninput="filterList()"
            />
          </div>
          <div class="filter-group" id="filterGroup">
            <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">
              全部
            </button>
            <button class="filter-chip" data-filter="active" onclick="setFilter('active', this)">
              已启用
            </button>
            <button
              class="filter-chip"
              data-filter="inactive"
              onclick="setFilter('inactive', this)"
            >
              已禁用
            </button>
            <button class="filter-chip" data-filter="pending" onclick="setFilter('pending', this)">
              待审核
            </button>
          </div>
        </div>
        <div class="toolbar-right"><i class="far fa-calendar-alt"></i> 最近更新：今天</div>
      </div>

      <!-- ===== 卡片网格 ===== -->
      <div class="grid-wrapper">
        <div class="mcp-grid" id="mcpGrid">
          <!-- 由 JavaScript 动态渲染 -->
        </div>

        <!-- ===== 空状态 ===== -->
        <div class="empty-state" id="emptyState" style="display: none">
          <i class="fas fa-inbox"></i>
          <p>没有找到匹配的 MCP 服务</p>
        </div>

        <!-- ===== 分页 ===== -->
        <div class="pagination" id="pagination">
          <div class="pagination-info">
            显示 <strong id="pageStart">1</strong> – <strong id="pageEnd">5</strong>， 共
            <strong id="totalItems">0</strong> 个
          </div>
          <div class="pagination-btns" id="paginationBtns">
            <!-- 由 JS 动态生成 -->
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Toast 容器 ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
      // ============================================================
      //  数据
      // ============================================================
      const mockData = [
        {
          id: 1,
          name: 'GitHub MCP',
          description: '仓库操作、PR 管理、Issue 追踪',
          endpoint: 'https://mcp.github.com/v1',
          status: 'active',
          avatarColor: 'blue',
          initial: 'G',
        },
        {
          id: 2,
          name: 'Slack MCP',
          description: '消息发送、频道管理、通知推送',
          endpoint: 'https://mcp.slack.com/api',
          status: 'active',
          avatarColor: 'purple',
          initial: 'S',
        },
        {
          id: 3,
          name: 'Database MCP',
          description: 'PostgreSQL 查询、迁移、数据管理',
          endpoint: 'https://mcp.db.internal:5432',
          status: 'inactive',
          avatarColor: 'orange',
          initial: 'D',
        },
        {
          id: 4,
          name: 'Jira MCP',
          description: '工单管理、敏捷看板、Sprint 操作',
          endpoint: 'https://mcp.jira.com/rest',
          status: 'active',
          avatarColor: 'pink',
          initial: 'J',
        },
        {
          id: 5,
          name: 'Filesystem MCP',
          description: '本地文件读写、目录管理、权限控制',
          endpoint: 'file:///var/mcp/fs',
          status: 'pending',
          avatarColor: 'teal',
          initial: 'F',
        },
        {
          id: 6,
          name: 'Email MCP',
          description: 'SMTP 发送、IMAP 收件、邮件解析',
          endpoint: 'https://mcp.email.com/smtp',
          status: 'active',
          avatarColor: 'green',
          initial: 'E',
        },
        {
          id: 7,
          name: 'Redis MCP',
          description: '缓存操作、键值管理、发布订阅',
          endpoint: 'redis://mcp.redis:6379',
          status: 'inactive',
          avatarColor: 'red',
          initial: 'R',
        },
        {
          id: 8,
          name: 'OpenAI MCP',
          description: '模型调用、Embedding、微调管理',
          endpoint: 'https://api.openai.com/mcp',
          status: 'active',
          avatarColor: 'indigo',
          initial: 'O',
        },
      ]

      // ============================================================
      //  状态
      // ============================================================
      let currentFilter = 'all'
      let currentPage = 1
      const pageSize = 6

      // ============================================================
      //  工具函数
      // ============================================================
      function getFilteredData() {
        const search = document.getElementById('searchInput').value.trim().toLowerCase()
        let filtered = [...mockData]

        if (currentFilter !== 'all') {
          filtered = filtered.filter((item) => item.status === currentFilter)
        }

        if (search) {
          filtered = filtered.filter(
            (item) =>
              item.name.toLowerCase().includes(search) ||
              item.description.toLowerCase().includes(search),
          )
        }

        return filtered
      }

      function getPaginatedData(data) {
        const start = (currentPage - 1) * pageSize
        const end = start + pageSize
        return data.slice(start, end)
      }

      // ============================================================
      //  渲染
      // ============================================================
      function render() {
        const filtered = getFilteredData()
        const total = filtered.length
        const totalPages = Math.ceil(total / pageSize) || 1

        if (currentPage > totalPages) currentPage = totalPages
        if (currentPage < 1) currentPage = 1

        const paginated = getPaginatedData(filtered)

        // 统计
        document.getElementById('totalCount').textContent = mockData.length
        document.getElementById('activeCount').textContent = mockData.filter(
          (d) => d.status === 'active',
        ).length
        document.getElementById('inactiveCount').textContent = mockData.filter(
          (d) => d.status === 'inactive',
        ).length
        document.getElementById('pendingCount').textContent = mockData.filter(
          (d) => d.status === 'pending',
        ).length

        const grid = document.getElementById('mcpGrid')
        const empty = document.getElementById('emptyState')

        if (paginated.length === 0) {
          grid.innerHTML = ''
          empty.style.display = 'flex'
          document.getElementById('pagination').style.display = 'none'
          return
        }
        empty.style.display = 'none'
        document.getElementById('pagination').style.display = 'flex'

        grid.innerHTML = paginated
          .map((item) => {
            const statusMap = {
              active: { label: '已启用', cls: 'active' },
              inactive: { label: '已禁用', cls: 'inactive' },
              pending: { label: '待审核', cls: 'pending' },
            }
            const st = statusMap[item.status] || statusMap.pending
            const isActive = item.status === 'active'

            return `
                        <div class="mcp-card" data-id="${item.id}">
                            <div class="mcp-card-header">
                                <div class="mcp-card-left">
                                    <div class="mcp-avatar ${item.avatarColor}">${item.initial}</div>
                                    <div class="mcp-card-info">
                                        <div class="name">${item.name}</div>
                                        <div class="desc">${item.description}</div>
                                    </div>
                                </div>
                                <div class="mcp-card-status">
                                    <span class="status-badge ${st.cls}">
                                        <span class="dot"></span> ${st.label}
                                    </span>
                                </div>
                            </div>
                            <div class="mcp-card-body">
                                <div class="mcp-endpoint">
                                    <i class="fas fa-link"></i>
                                    <span title="${item.endpoint}">${item.endpoint}</span>
                                </div>
                            </div>
                            <div class="mcp-card-footer">
                                <div class="mcp-card-footer-left">
                                    <i class="far fa-clock"></i>
                                    <span>${isActive ? '运行中' : item.status === 'pending' ? '等待审核' : '已停用'}</span>
                                </div>
                                <div style="display:flex;align-items:center;gap:12px;">
                                    <button class="toggle-switch ${isActive ? 'active' : ''}"
                                            onclick="toggleStatus(${item.id})"
                                            aria-label="切换状态">
                                    </button>
                                    <div class="mcp-card-actions">
                                        <button class="btn btn-ghost btn-sm btn-icon" onclick="editMCP(${item.id})" title="编辑">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-danger-ghost btn-sm btn-icon" onclick="deleteMCP(${item.id})" title="删除">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
          })
          .join('')

        // 分页信息
        const start = total === 0 ? 0 : (currentPage - 1) * pageSize + 1
        const end = Math.min(currentPage * pageSize, total)
        document.getElementById('pageStart').textContent = start
        document.getElementById('pageEnd').textContent = end
        document.getElementById('totalItems').textContent = total

        renderPagination(totalPages)
      }

      function renderPagination(totalPages) {
        const container = document.getElementById('paginationBtns')
        let html = ''

        html += `<button class="page-btn arrow" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>
                        <i class="fas fa-chevron-left"></i>
                    </button>`

        for (let i = 1; i <= totalPages; i++) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`
        }

        html += `<button class="page-btn arrow" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>
                        <i class="fas fa-chevron-right"></i>
                    </button>`

        container.innerHTML = html
      }

      // ============================================================
      //  交互
      // ============================================================
      function setFilter(filter, btn) {
        currentFilter = filter
        currentPage = 1
        document.querySelectorAll('.filter-chip').forEach((c) => c.classList.remove('active'))
        if (btn) btn.classList.add('active')
        render()
      }

      function filterList() {
        currentPage = 1
        render()
      }

      function goPage(page) {
        const filtered = getFilteredData()
        const totalPages = Math.ceil(filtered.length / pageSize) || 1
        if (page < 1 || page > totalPages) return
        currentPage = page
        render()
      }

      function toggleStatus(id) {
        const item = mockData.find((d) => d.id === id)
        if (!item) return
        const newStatus = item.status === 'active' ? 'inactive' : 'active'
        item.status = newStatus
        render()
        const label = newStatus === 'active' ? '已启用' : '已禁用'
        showToast(`「${item.name}」${label}`, 'success')
      }

      function editMCP(id) {
        const item = mockData.find((d) => d.id === id)
        if (!item) return
        showToast(`编辑 MCP：${item.name}（演示交互）`, 'info')
      }

      function deleteMCP(id) {
        const idx = mockData.findIndex((d) => d.id === id)
        if (idx === -1) return
        const name = mockData[idx].name
        if (confirm(`确定要删除 MCP「${name}」吗？`)) {
          mockData.splice(idx, 1)
          render()
          showToast(`已删除「${name}」`, 'success')
        }
      }

      function addMCP() {
        const newId = Math.max(...mockData.map((d) => d.id), 0) + 1
        const colors = ['blue', 'purple', 'green', 'orange', 'pink', 'teal', 'red', 'indigo']
        mockData.push({
          id: newId,
          name: `新 MCP #${newId}`,
          description: '点击编辑修改描述',
          endpoint: 'https://mcp.example.com/new',
          status: 'pending',
          avatarColor: colors[Math.floor(Math.random() * colors.length)],
          initial: 'N',
        })
        render()
        showToast('已添加新的 MCP 服务', 'success')
      }

      function refreshList() {
        showToast('已刷新列表', 'info')
        render()
      }

      // ============================================================
      //  Toast
      // ============================================================
      function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer')
        const toast = document.createElement('div')
        toast.className = `toast ${type}`
        const icon = type === 'success' ? 'fa-check-circle' : 'fa-info-circle'
        toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`
        container.appendChild(toast)

        setTimeout(() => {
          toast.classList.add('removing')
          setTimeout(() => toast.remove(), 300)
        }, 2600)
      }

      // ============================================================
      //  启动
      // ============================================================
      render()
    </script>
  </body>
</html>
